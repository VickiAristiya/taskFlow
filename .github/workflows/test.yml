name: TaskFlow Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'          # ✅ fix: ganti dari 3.9

    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Start Backend Server
      run: |
        cd backend
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 5

    - name: Verifikasi Backend Berjalan
      run: |
        curl --retry 5 --retry-delay 3 --retry-connrefused http://127.0.0.1:8000/api/tasks \
          && echo "✅ Backend aktif" \
          || (echo "❌ Backend gagal start" && exit 1)

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra

    - name: Buat Folder Reports
      run: mkdir -p reports

    - name: Run API Tests
      run: |
        newman run test/postman/TaskFlow_API_Collection.json \
          -e test/postman/TaskFlow_CI_Environment.json \
          --delay-request 100 \
          --timeout-request 5000 \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export reports/api-test-report.html

    - name: Upload API Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-report
        path: reports/api-test-report.html

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'          # ✅ fix: ganti dari 3.9

    - name: Install Backend Dependencies # ✅ fix: backend harus jalan di job ini
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Start Backend Server         # ✅ fix: frontend butuh backend untuk CRUD
      run: |
        cd backend
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 5

    - name: Verifikasi Backend Berjalan
      run: |
        curl --retry 5 --retry-delay 3 --retry-connrefused http://127.0.0.1:8000/api/tasks \
          && echo "✅ Backend aktif" \
          || (echo "❌ Backend gagal start" && exit 1)

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: Start PHP Server
      run: |
        cd frontend
        php -S 127.0.0.1:8080 &
        sleep 3

    - name: Verifikasi PHP Server Berjalan
      run: |
        curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:8080 \
          && echo "✅ PHP Server aktif" \
          || (echo "❌ PHP Server gagal start" && exit 1)

    - name: Install Selenium Dependencies
      run: pip install selenium pytest pytest-html webdriver-manager

    - name: Buat Folder Reports
      run: mkdir -p reports/screenshots

    - name: Debug Koneksi Frontend ke Backend   # ✅ tambah sementara untuk diagnosis
        run: |
            echo "=== Test curl ke backend ==="
            curl -s http://127.0.0.1:8000/api/tasks | head -c 200
            echo ""
            echo "=== URL backend di kode frontend ==="
            grep -rn "8000\|localhost\|127.0.0.1\|api" frontend/ --include="*.php" --include="*.js" | head -30


    - name: Run Selenium Tests
      env:
        HEADLESS: "true"
      run: |
        cd test/selenium
        pytest test_frontend.py -v \
          --html=../../reports/frontend-test-report.html \
          --self-contained-html

    - name: Upload Selenium Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-test-report
        path: reports/frontend-test-report.html

    - name: Upload Screenshots (jika gagal)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: selenium-screenshots
        path: reports/screenshots/